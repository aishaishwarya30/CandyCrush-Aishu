<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Candy Crush Game 🍬</title>
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
</head>

<body>

  <h1 class="title">Candy Crush Game 🍬</h1>

  <!-- NEW WRAPPER -->
  <div class="info">
    <div class="scoreContent">
      <h3>Score</h3>
      <h1 id="score">0</h1>
    </div>

    <div class="timerContent">
      <h3>Time Left</h3>
      <h1 id="timer">60</h1>
    </div>
  </div>

  <button onclick="restartGame()">Restart Game</button>

  <div class="grid"></div>

</body>
</html>
